<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WORD FORGE - Settings Dossier</title>
    <style>
        /* Modern Font Imports */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@800&display=swap');

        /* Root Color Palette & Environmental Variables */
        :root {
            --bg-walnut-dark: #0f0704;
            --leather-border: #120502;
            --leather-base: #36170d;
            --parchment-top: #fbf5e8;
            --parchment-center: #f3e9d4;
            --parchment-edge: #dac3a0;
            --ink-primary: #331f13;
            --olive-gradient-top: #526332;
            --olive-gradient-bottom: #2b3819;
        }

        /* Strict Reset for Edge-to-Edge Fullscreen Layout */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
            font-family: 'Cinzel', Georgia, serif;
            color: var(--ink-primary);
            background-color: var(--leather-base);
            -webkit-tap-highlight-color: transparent;
        }

        /* Fullscreen Leather Dossier Container */
        .leather-dossier {
            position: relative;
            width: 100vw;
            height: 100dvh;
            background: linear-gradient(155deg, #421d10 0%, #281007 50%, #150602 100%);
            padding: clamp(12px, 3vw, 24px);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset 0 0 0 2px rgba(92, 45, 23, 0.4),
                inset 0 0 35px rgba(0, 0, 0, 0.95);
        }

        /* 3D Heavy Brass Corner Caps with Rivets */
        .brass-corner {
            position: absolute;
            width: clamp(40px, 10vw, 60px);
            height: clamp(40px, 10vw, 60px);
            z-index: 30;
            pointer-events: none;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.9));
        }

        .brass-corner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #fbe8b5 0%, #b38d3b 35%, #5e4311 70%, #2b1c02 100%);
        }

        /* Brass Corner Rivet Head */
        .brass-corner::after {
            content: '';
            position: absolute;
            width: clamp(6px, 1.5vw, 9px);
            height: clamp(6px, 1.5vw, 9px);
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #8c671b 70%, #1e1101 100%);
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }

        .top-left { top: 0; left: 0; }
        .top-left::before { clip-path: polygon(0 0, 100% 0, 100% 32%, 32% 32%, 32% 100%, 0 100%); }
        .top-left::after { top: 8px; left: 8px; }

        .top-right { top: 0; right: 0; }
        .top-right::before { clip-path: polygon(0 0, 100% 0, 100% 100%, 68% 100%, 68% 32%, 0 32%); }
        .top-right::after { top: 8px; right: 8px; }

        .bottom-left { bottom: 0; left: 0; }
        .bottom-left::before { clip-path: polygon(0 0, 32% 0, 32% 68%, 100% 68%, 100% 100%, 0 100%); }
        .bottom-left::after { bottom: 8px; left: 8px; }

        .bottom-right { bottom: 0; right: 0; }
        .bottom-right::before { clip-path: polygon(68% 0, 100% 0, 100% 100%, 0 100%, 0 68%, 68% 68%); }
        .bottom-right::after { bottom: 8px; right: 8px; }

        /* Parchment Inner Page Sheet - Fills Available Container Height */
        .parchment-sheet {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 650px; /* Keeps text layout balanced on large screen widths */
            margin: 0 auto;
            background: radial-gradient(ellipse at 50% 30%, var(--parchment-top) 0%, var(--parchment-center) 60%, var(--parchment-edge) 100%);
            border-radius: 4px;
            padding: clamp(20px, 4vw, 36px) clamp(16px, 4vw, 32px);
            border: 1px solid #7a5e3a;
            box-shadow: 
                inset 0 0 50px rgba(97, 65, 27, 0.28),
                0 2px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }

        /* Top Header Area */
        .header-bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: clamp(44px, 9vw, 56px);
        }

        /* 3D Circular Back Button */
        .back-button {
            position: absolute;
            left: 0;
            width: clamp(40px, 9vw, 48px);
            height: clamp(40px, 9vw, 48px);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #a88851, #5a3f1c 70%, #261806 100%);
            border: 2px solid #1a0f04;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.55),
                inset 0 1px 2px rgba(255,255,255,0.65);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .back-button::after {
            content: '←';
            color: #fcecd2;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 900;
            text-shadow: 0 -1px 2px #000;
        }

        .back-button:active {
            transform: scale(0.94);
        }

        /* Page Heading */
        .page-title {
            font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif;
            font-size: clamp(1.8rem, 5.5vw, 2.6rem);
            font-weight: 900;
            color: #382114;
            letter-spacing: clamp(2px, 0.8vw, 5px);
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.85);
        }

        /* Ornate Star Divider Rule */
        .star-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            width: 90%;
        }

        .divider-bar {
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, transparent, #85663c 35%, #523a1a 70%, transparent);
        }

        .divider-star {
            margin: 0 10px;
            color: #6e4e24;
            font-size: 11px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.7);
        }

        /* Setting Item Row Layout */
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: clamp(10px, 2vw, 16px) 0;
            border-bottom: 1px dashed rgba(105, 71, 38, 0.35);
        }

        .setting-item:last-of-type {
            border-bottom: none;
        }

        .setting-label-group {
            display: flex;
            align-items: center;
            gap: clamp(12px, 3.2vw, 22px);
        }

        .setting-title {
            font-size: clamp(0.95rem, 2.6vw, 1.15rem);
            font-weight: 800;
            color: #362114;
            letter-spacing: 1.5px;
        }

        /* 3D Metallic Bronze SVG Icons */
        .icon-bronze {
            width: clamp(24px, 5.5vw, 30px);
            height: clamp(24px, 5.5vw, 30px);
            fill: url(#bronze-gradient-fill);
            filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.45));
        }

        /* Custom 3D Metallic Toggle Switch */
        .toggle-container {
            display: flex;
            width: clamp(100px, 23vw, 118px);
            height: clamp(34px, 8vw, 40px);
            background: linear-gradient(180deg, #402f1a, #1a1006);
            border: 2px solid #241609;
            border-radius: 6px;
            padding: 2px;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.4),
                inset 0 2px 5px rgba(0,0,0,0.85);
            cursor: pointer;
        }

        .toggle-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.72rem, 1.9vw, 0.82rem);
            font-weight: 800;
            color: #3b2818;
            border-radius: 4px;
            user-select: none;
        }

        .toggle-state.active {
            background: linear-gradient(180deg, var(--olive-gradient-top) 0%, var(--olive-gradient-bottom) 100%);
            color: #e3d4b6;
            border: 1px solid #1a240d;
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.4),
                0 2px 4px rgba(0,0,0,0.6);
            text-shadow: 0 -1px 1px rgba(0,0,0,0.9);
        }

        /* Metallic Language Dropdown Selector */
        .dropdown-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: clamp(105px, 24vw, 122px);
            height: clamp(34px, 8vw, 40px);
            padding: 0 clamp(8px, 2vw, 12px);
            background: linear-gradient(180deg, #dfd0ae 0%, #a18660 100%);
            border: 2px solid #332110;
            border-radius: 6px;
            font-size: clamp(0.75rem, 1.9vw, 0.85rem);
            font-weight: 800;
            color: #2b1a0d;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.35),
                inset 0 1px 1px rgba(255,255,255,0.6);
            cursor: pointer;
        }

        .dropdown-container span:last-child {
            font-size: clamp(8px, 2vw, 10px);
            color: #3d2714;
        }

        /* Action Chevron Indicators */
        .arrow-action {
            font-size: clamp(1.1rem, 2.6vw, 1.3rem);
            font-weight: 900;
            color: #5c4127;
            padding-right: 4px;
            cursor: pointer;
            text-shadow: 0 1px 0 rgba(255,255,255,0.6);
        }

        /* Subtle Corner Diamond Emblem */
        .watermark-emblem {
            position: absolute;
            bottom: 12px;
            right: 14px;
            width: 18px;
            height: 18px;
            background: rgba(110, 75, 38, 0.16);
            transform: rotate(45deg);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Metallic SVG Gradient Definition -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true">
        <defs>
            <linearGradient id="bronze-gradient-fill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#8a6733" />
                <stop offset="50%" stop-color="#543b17" />
                <stop offset="100%" stop-color="#33210a" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Outer Leather Frame Structure -->
    <main class="leather-dossier" role="main">
        <div class="brass-corner top-left"></div>
        <div class="brass-corner top-right"></div>
        <div class="brass-corner bottom-left"></div>
        <div class="brass-corner bottom-right"></div>

        <!-- Inner Parchment Page Sheet -->
        <article class="parchment-sheet">
            <!-- Header Section -->
            <header class="header-bar">
                <button class="back-button" aria-label="Go Back"></button>
                <h1 class="page-title">SETTINGS</h1>
            </header>

            <!-- Star Ornament Divider Line -->
            <div class="star-divider">
                <div class="divider-bar"></div>
                <div class="divider-star">★</div>
                <div class="divider-bar"></div>
            </div>

            <!-- Music Row -->
            <section class="setting-item">
                <div class="setting-label-group">
                    <svg class="icon-bronze" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    <span class="setting-title">MUSIC</span>
                </div>
                <div class="toggle-container" role="switch" aria-checked="true">
                    <div class="toggle-state active">ON</div>
                    <div class="toggle-state">OFF</div>
                </div>
            </section>

            <!-- Sound Row -->
            <section class="setting-item">
                <div class="setting-label-group">
                    <svg class="icon-bronze" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <span class="setting-title">SOUND</span>
                </div>
                <div class="toggle-container" role="switch" aria-checked="true">
                    <div class="toggle-state active">ON</div>
                    <div class="toggle-state">OFF</div>
                </div>
            </section>

            <!-- Language Row -->
            <section class="setting-item">
                <div class="setting-label-group">
                    <svg class="icon-bronze" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
                    <span class="setting-title">LANGUAGE</span>
                </div>
                <div class="dropdown-container">
                    <span>ENGLISH</span>
                    <span>▼</span>
                </div>
            </section>

            <!-- Reset Progress Row -->
            <section class="setting-item">
                <div class="setting-label-group">
                    <svg class="icon-bronze" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                    <span class="setting-title">RESET PROGRESS</span>
                </div>
                <div class="arrow-action">❯</div>
            </section>

            <!-- Restore Purchases Row -->
            <section class="setting-item">
                <div class="setting-label-group">
                    <svg class="icon-bronze" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <span class="setting-title">RESTORE PURCHASES</span>
                </div>
                <div class="arrow-action">❯</div>
            </section>

            <!-- About Section Row -->
            <section class="setting-item">
                <div class="setting-label-group">
                    <svg class="icon-bronze" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    <span class="setting-title">ABOUT</span>
                </div>
                <div class="arrow-action">❯</div>
            </section>

            <div class="watermark-emblem"></div>
        </article>
    </main>

</body>
</html>
