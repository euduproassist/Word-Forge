<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>WORD FORGE - Settings</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Montserrat:wght@700;800&display=swap');

        /* Root Color Palette & Variables */
        :root {
            --bg-desk: #140a06;
            --leather-dark: #120603;
            --leather-mid: #2d140a;
            --leather-light: #482012;
            --parchment-center: #f6eee0;
            --parchment-mid: #ebdcc3;
            --parchment-edge: #cca377;
            --ink-main: #362013;
            --olive-bright: #526632;
            --olive-dark: #2c3819;
            --brass-light: #f7e2a3;
            --brass-mid: #9c7b39;
            --brass-dark: #3b2807;
        }

        /* Strict Horizontal Overflow Guard */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: var(--bg-desk);
            background-image: 
                radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.95) 100%),
                repeating-linear-gradient(0deg, #0d0604 0px, #0d0604 36px, #1a0c07 36px, #1a0c07 72px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(12px, 3vw, 30px);
            font-family: 'Cinzel', Georgia, serif;
            color: var(--ink-main);
        }

        /* Leather Dossier / Clipboard Container */
        .leather-frame {
            position: relative;
            width: min(100%, 520px);
            background: linear-gradient(150deg, var(--leather-light) 0%, var(--leather-mid) 45%, var(--leather-dark) 100%);
            border-radius: clamp(10px, 2.5vw, 16px);
            padding: clamp(12px, 2.8vw, 20px);
            border: 3px solid #090302;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.95),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                inset 0 0 20px rgba(0, 0, 0, 0.9);
        }

        /* 3D Heavy Brass Corner Caps */
        .corner-brass {
            position: absolute;
            width: clamp(36px, 8vw, 48px);
            height: clamp(36px, 8vw, 48px);
            z-index: 30;
            pointer-events: none;
            filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.9));
        }

        .corner-brass::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #faebb7 0%, #ba933e 35%, #664a13 70%, #2e1d03 100%);
        }

        .corner-brass::after {
            content: '';
            position: absolute;
            width: clamp(5px, 1.2vw, 7px);
            height: clamp(5px, 1.2vw, 7px);
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #856118 70%, #211201 100%);
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }

        .c-tl { top: 0; left: 0; }
        .c-tl::before { clip-path: polygon(0 0, 100% 0, 100% 30%, 30% 30%, 30% 100%, 0 100%); border-top-left-radius: 12px; }
        .c-tl::after { top: 7px; left: 7px; }

        .c-tr { top: 0; right: 0; }
        .c-tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%, 70% 100%, 70% 30%, 0 30%); border-top-right-radius: 12px; }
        .c-tr::after { top: 7px; right: 7px; }

        .c-bl { bottom: 0; left: 0; }
        .c-bl::before { clip-path: polygon(0 0, 30% 0, 30% 70%, 100% 70%, 100% 100%, 0 100%); border-bottom-left-radius: 12px; }
        .c-bl::after { bottom: 7px; left: 7px; }

        .c-br { bottom: 0; right: 0; }
        .c-br::before { clip-path: polygon(70% 0, 100% 0, 100% 100%, 0 100%, 0 70%, 70% 70%); border-bottom-right-radius: 12px; }
        .c-br::after { bottom: 7px; right: 7px; }

        /* Parchment Inner Document */
        .parchment-sheet {
            position: relative;
            width: 100%;
            background: radial-gradient(ellipse at 50% 35%, var(--parchment-center) 0%, var(--parchment-mid) 65%, var(--parchment-edge) 100%);
            border-radius: 6px;
            padding: clamp(22px, 5vw, 36px) clamp(16px, 4vw, 28px);
            border: 1px solid #7d613e;
            box-shadow: 
                inset 0 0 50px rgba(97, 65, 27, 0.3),
                0 0 12px rgba(0, 0, 0, 0.5);
        }

        /* Top Bar Header Area */
        .header-section {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: clamp(42px, 9vw, 54px);
            margin-bottom: clamp(10px, 2.5vw, 16px);
        }

        .btn-back-brass {
            position: absolute;
            left: 0;
            width: clamp(40px, 9vw, 48px);
            height: clamp(40px, 9vw, 48px);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #a88851, #5c411d 70%, #291907 100%);
            border: 2px solid #1f1205;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.6),
                inset 0 1px 2px rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .btn-back-brass::after {
            content: '←';
            color: #f7e8ce;
            font-size: clamp(18px, 4.2vw, 24px);
            font-weight: 900;
            text-shadow: 0 -1px 2px #000;
        }

        .btn-back-brass:active {
            transform: scale(0.94);
        }

        .heading-title {
            font-size: clamp(1.8rem, 5.5vw, 2.6rem);
            font-weight: 900;
            color: #382215;
            letter-spacing: clamp(2px, 0.8vw, 4px);
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8);
        }

        /* Ornate Star Divider Rule */
        .ornate-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto clamp(18px, 4vw, 28px) auto;
            width: 85%;
        }

        .ornate-line {
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, transparent, #85663c 30%, #523a1a 70%, transparent);
        }

        .ornate-star {
            margin: 0 10px;
            color: #6b4d24;
            font-size: 11px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.7);
        }

        /* Setting Row Layout */
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: clamp(11px, 2.8vw, 16px) 0;
            border-bottom: 1px dashed rgba(105, 71, 38, 0.35);
        }

        .setting-row:last-of-type {
            border-bottom: none;
        }

        .setting-left {
            display: flex;
            align-items: center;
            gap: clamp(12px, 3.2vw, 20px);
        }

        .label-text {
            font-size: clamp(0.95rem, 2.6vw, 1.15rem);
            font-weight: 800;
            color: #362114;
            letter-spacing: 1.5px;
        }

        /* 3D Metallic Bronze SVG Icons */
        .icon-metallic {
            width: clamp(24px, 5.5vw, 30px);
            height: clamp(24px, 5.5vw, 30px);
            fill: url(#brass-gradient-fill);
            filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.4));
        }

        /* 3D Olive & Brass Toggle Switch */
        .toggle-switch-3d {
            display: flex;
            width: clamp(100px, 23vw, 118px);
            height: clamp(34px, 8vw, 40px);
            background: linear-gradient(180deg, #402f1a, #1a1006);
            border: 2px solid #241609;
            border-radius: 6px;
            padding: 2px;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.4),
                inset 0 2px 5px rgba(0,0,0,0.85);
            cursor: pointer;
        }

        .toggle-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.72rem, 1.9vw, 0.82rem);
            font-weight: 800;
            color: #3b2818;
            border-radius: 4px;
            user-select: none;
        }

        .toggle-option.active {
            background: linear-gradient(180deg, var(--olive-bright) 0%, var(--olive-dark) 100%);
            color: #e3d4b6;
            border: 1px solid #1a240d;
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.4),
                0 2px 4px rgba(0,0,0,0.6);
            text-shadow: 0 -1px 1px rgba(0,0,0,0.9);
        }

        /* Metallic Brass Dropdown */
        .dropdown-brass {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: clamp(105px, 24vw, 122px);
            height: clamp(34px, 8vw, 40px);
            padding: 0 clamp(8px, 2vw, 12px);
            background: linear-gradient(180deg, #dfd0ae 0%, #a18660 100%);
            border: 2px solid #332110;
            border-radius: 6px;
            font-size: clamp(0.75rem, 1.9vw, 0.85rem);
            font-weight: 800;
            color: #2b1a0d;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.35),
                inset 0 1px 1px rgba(255,255,255,0.6);
            cursor: pointer;
        }

        .dropdown-brass span:last-child {
            font-size: clamp(8px, 2vw, 10px);
            color: #3d2714;
        }

        /* Action Chevron Indicator */
        .action-chevron {
            font-size: clamp(1.1rem, 2.6vw, 1.3rem);
            font-weight: 900;
            color: #5c4127;
            padding-right: 4px;
            cursor: pointer;
            text-shadow: 0 1px 0 rgba(255,255,255,0.6);
        }

        /* Subtle Corner Diamond Emblem */
        .watermark-emblem {
            position: absolute;
            bottom: 12px;
            right: 14px;
            width: 18px;
            height: 18px;
            background: rgba(110, 75, 38, 0.16);
            transform: rotate(45deg);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Metallic Gradient Definitions for Vector Icons -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true">
        <defs>
            <linearGradient id="brass-gradient-fill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#8a6733" />
                <stop offset="50%" stop-color="#543b17" />
                <stop offset="100%" stop-color="#33210a" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Outer Leather Frame -->
    <div class="leather-frame">
        <div class="corner-brass c-tl"></div>
        <div class="corner-brass c-tr"></div>
        <div class="corner-brass c-bl"></div>
        <div class="corner-brass c-br"></div>

        <!-- Inner Parchment Page -->
        <div class="parchment-sheet">
            
            <!-- Top Header -->
            <div class="header-section">
                <button class="btn-back-brass" aria-label="Back"></button>
                <h1 class="heading-title">SETTINGS</h1>
            </div>

            <!-- Star Divider -->
            <div class="ornate-divider">
                <div class="ornate-line"></div>
                <div class="ornate-star">★</div>
                <div class="ornate-line"></div>
            </div>

            <!-- Music Setting -->
            <div class="setting-row">
                <div class="setting-left">
                    <svg class="icon-metallic" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    <span class="label-text">MUSIC</span>
                </div>
                <div class="toggle-switch-3d" role="switch" aria-checked="true">
                    <div class="toggle-option active">ON</div>
                    <div class="toggle-option">OFF</div>
                </div>
            </div>

            <!-- Sound Setting -->
            <div class="setting-row">
                <div class="setting-left">
                    <svg class="icon-metallic" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <span class="label-text">SOUND</span>
                </div>
                <div class="toggle-switch-3d" role="switch" aria-checked="true">
                    <div class="toggle-option active">ON</div>
                    <div class="toggle-option">OFF</div>
                </div>
            </div>

            <!-- Language Setting -->
            <div class="setting-row">
                <div class="setting-left">
                    <svg class="icon-metallic" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
                    <span class="label-text">LANGUAGE</span>
                </div>
                <div class="dropdown-brass">
                    <span>ENGLISH</span>
                    <span>▼</span>
                </div>
            </div>

            <!-- Reset Progress -->
            <div class="setting-row">
                <div class="setting-left">
                    <svg class="icon-metallic" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                    <span class="label-text">RESET PROGRESS</span>
                </div>
                <div class="action-chevron">❯</div>
            </div>

            <!-- Restore Purchases -->
            <div class="setting-row">
                <div class="setting-left">
                    <svg class="icon-metallic" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <span class="label-text">RESTORE PURCHASES</span>
                </div>
                <div class="action-chevron">❯</div>
            </div>

            <!-- About -->
            <div class="setting-row">
                <div class="setting-left">
                    <svg class="icon-metallic" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    <span class="label-text">ABOUT</span>
                </div>
                <div class="action-chevron">❯</div>
            </div>

            <div class="watermark-emblem"></div>
        </div>
    </div>

</body>
</html>
